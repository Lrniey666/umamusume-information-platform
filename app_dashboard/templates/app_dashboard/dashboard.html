{% extends 'base.html' %}
{% block title %}儀表板 — 賽馬娘留言情緒分析{% endblock %}

{% block extra_css %}
<style>
  /* stat-icon 語意色：淺色主題用柔和底色，深色主題轉為半透明強調底 */
  .stat-icon-purple { background: #ede9fe; color: #7c3aed; }
  .stat-icon-green  { background: #dcfce7; color: #16a34a; }
  .stat-icon-amber  { background: #fef9c3; color: #ca8a04; }
  .stat-icon-red    { background: #fee2e2; color: #dc2626; }
  [data-theme="dark"] .stat-icon-purple { background: rgba(139,92,246,.20); color: #c4b5fd; }
  [data-theme="dark"] .stat-icon-green  { background: rgba(76,194,138,.18); color: #6ee7b7; }
  [data-theme="dark"] .stat-icon-amber  { background: rgba(232,199,101,.18); color: #fcd34d; }
  [data-theme="dark"] .stat-icon-red    { background: rgba(240,112,96,.18); color: #fca5a5; }
</style>
{% endblock %}

{% block content %}
<h2 class="mb-4 fw-bold"><i class="bi bi-speedometer2 text-purple"></i> 情緒分析儀表板</h2>

<!-- 統計卡片 -->
<div class="row g-3 mb-4" id="summary-cards">
  <div class="col-6 col-md-3">
    <div class="stat-card">
      <div class="stat-icon stat-icon-purple"><i class="bi bi-file-earmark-check"></i></div>
      <div class="stat-val" id="stat-analyzed">—</div>
      <div class="stat-label">已分析公告</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="stat-card">
      <div class="stat-icon stat-icon-green"><i class="bi bi-chat-dots"></i></div>
      <div class="stat-val" id="stat-comments">—</div>
      <div class="stat-label">總留言數</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="stat-card">
      <div class="stat-icon stat-icon-amber"><i class="bi bi-emoji-smile"></i></div>
      <div class="stat-val" id="stat-positive">—</div>
      <div class="stat-label">整體正面率</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="stat-card">
      <div class="stat-icon stat-icon-red"><i class="bi bi-hourglass-split"></i></div>
      <div class="stat-val" id="stat-pending">—</div>
      <div class="stat-label">待分析公告</div>
    </div>
  </div>
</div>

<!-- 圖表區 -->
<div class="row g-4 mb-4">
  <div class="col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-header fw-semibold"><i class="bi bi-pie-chart-fill text-purple"></i> 整體情緒分布</div>
      <div class="card-body d-flex align-items-center justify-content-center">
        <canvas id="pieChart" style="max-height:250px"></canvas>
      </div>
    </div>
  </div>
  <div class="col-md-8">
    <div class="card shadow-sm h-100">
      <div class="card-header fw-semibold"><i class="bi bi-bar-chart-fill text-purple"></i> 各類別正面率</div>
      <div class="card-body">
        <canvas id="barChart" style="max-height:250px"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="row g-4 mb-4">
  <div class="col-12">
    <div class="card shadow-sm">
      <div class="card-header fw-semibold"><i class="bi bi-graph-up text-purple"></i> 情緒時間趨勢（按月）</div>
      <div class="card-body">
        <canvas id="lineChart" style="max-height:300px"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- 最新公告列表 -->
<div class="card shadow-sm">
  <div class="card-header d-flex justify-content-between align-items-center fw-semibold">
    <span><i class="bi bi-clock text-purple"></i> 最新公告</span>
    <a href="{% url 'announcement_list' %}" class="btn btn-sm btn-outline-purple">查看全部</a>
  </div>
  <div class="card-body p-0" id="latest-list">
    <div class="text-center py-4 text-muted">載入中...</div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(function(){
  $.getJSON('/api/stats/', function(d){
    $('#stat-analyzed').text(d.summary.total_analyzed);
    $('#stat-comments').text(d.summary.total_comments.toLocaleString());
    $('#stat-positive').text((d.summary.avg_positive*100).toFixed(1)+'%');
    $('#stat-pending').text(d.summary.pending_count);

    // 圓餅圖
    new Chart(document.getElementById('pieChart'), {
      type: 'pie',
      data: {
        labels: ['正面','負面','中立'],
        datasets:[{ data:[d.pie_data.positive, d.pie_data.negative, d.pie_data.neutral],
          backgroundColor:['#22c55e','#ef4444','#94a3b8'] }]
      },
      options:{ plugins:{ legend:{ position:'bottom' } } }
    });

    // 橫向條狀圖
    new Chart(document.getElementById('barChart'), {
      type:'bar',
      data:{
        labels: d.bar_data.categories,
        datasets:[{ label:'正面率 (%)', data: d.bar_data.positive_rates,
          backgroundColor:'rgba(124,58,237,0.7)', borderRadius:6 }]
      },
      options:{ indexAxis:'y', plugins:{legend:{display:false}},
        scales:{ x:{ min:0, max:100, ticks:{ callback: v=>v+'%' } } } }
    });

    // 折線圖
    new Chart(document.getElementById('lineChart'), {
      type:'line',
      data:{
        labels: d.line_data.labels,
        datasets:[
          { label:'正面', data: d.line_data.positive.map(v=>+(v*100).toFixed(1)),
            borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,0.1)', tension:0.3, fill:false },
          { label:'負面', data: d.line_data.negative.map(v=>+(v*100).toFixed(1)),
            borderColor:'#ef4444', backgroundColor:'rgba(239,68,68,0.1)', tension:0.3, fill:false },
          { label:'中立', data: d.line_data.neutral.map(v=>+(v*100).toFixed(1)),
            borderColor:'#94a3b8', backgroundColor:'rgba(148,163,184,0.1)', tension:0.3, fill:false },
        ]
      },
      options:{ scales:{ y:{ min:0, max:100, ticks:{ callback: v=>v+'%' } } } }
    });
  });

  // 最新公告卡片
  $.getJSON('/api/announcements/?limit=6', function(d){
    const items = d.announcements;
    if(!items.length){ $('#latest-list').html('<div class="text-center py-3 text-muted">尚無資料</div>'); return; }
    const html = items.map(a => {
      const badge = a.analyzed
        ? `<span class="badge bg-success">${(a.positive_score*100).toFixed(0)}% 正面</span>`
        : `<span class="badge bg-secondary">⏳ 待分析</span>`;
      const catColor = {'活動':'purple','卡池':'warning','競賽':'info','系統':'secondary','其他':'light'}[a.category]||'secondary';
      return `<a href="/dashboard/announcements/${a.id}/" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
        <div>
          <span class="badge bg-${catColor} me-2">${a.category}</span>
          <strong>${a.title.substring(0,40)}</strong>
          <small class="text-muted ms-2">${a.published_date}</small>
        </div>
        <div class="d-flex align-items-center gap-2">
          <small class="text-muted"><i class="bi bi-chat"></i> ${a.comments_count}</small>
          ${badge}
        </div>
      </a>`;
    }).join('');
    $('#latest-list').html('<div class="list-group list-group-flush">'+html+'</div>');
  });
});
</script>
{% endblock %}
