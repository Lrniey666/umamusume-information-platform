{% extends 'base.html' %}
{% block title %}排程管理 — 賽馬娘留言情緒分析{% endblock %}

{% block content %}
<h2 class="fw-bold mb-4"><i class="bi bi-clock-history text-purple"></i> 排程管理</h2>

<div class="row g-4">
  <div class="col-md-5">
    <!-- 狀態卡片 -->
    <div class="card shadow-sm mb-4">
      <div class="card-header fw-semibold"><i class="bi bi-activity text-purple"></i> 排程狀態</div>
      <div class="card-body text-center py-4">
        <div id="scheduler-status-badge" class="mb-3">
          <span class="badge bg-secondary fs-6" id="status-text">查詢中...</span>
        </div>
        <div class="d-flex gap-2 justify-content-center mb-3">
          <button id="btn-start" class="btn btn-success" onclick="controlScheduler('start')">
            <i class="bi bi-play-fill"></i> 啟動排程
          </button>
          <button id="btn-stop" class="btn btn-danger" onclick="controlScheduler('stop')">
            <i class="bi bi-stop-fill"></i> 停止排程
          </button>
        </div>
        <div id="next-run-info" class="text-muted small"></div>
      </div>
    </div>

    <!-- 立即執行 -->
    <div class="card shadow-sm">
      <div class="card-header fw-semibold"><i class="bi bi-lightning-fill text-purple"></i> 立即執行</div>
      <div class="card-body">
        <p class="text-muted small">在背景立即執行一次分析任務，不受排程時間限制。</p>
        <button id="btn-run-now" class="btn btn-purple w-100" onclick="runNow()">
          <i class="bi bi-robot"></i> 立即執行情緒分析
        </button>
        <div id="run-result" class="mt-2"></div>
      </div>
    </div>
  </div>

  <div class="col-md-7">
    <!-- 執行歷史 -->
    <div class="card shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center fw-semibold">
        <span><i class="bi bi-journal-text text-purple"></i> 執行歷史（最近 20 筆）</span>
        <button class="btn btn-sm btn-outline-secondary" onclick="loadHistory()">
          <i class="bi bi-arrow-clockwise"></i> 重新整理
        </button>
      </div>
      <div class="card-body p-0">
        <div id="history-table">
          <div class="text-center py-4 text-muted">載入中...</div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function loadStatus() {
  $.getJSON('/api/scheduler/status/', function(d) {
    const badge = d.running
      ? '<span class="badge bg-success fs-6"><i class="bi bi-circle-fill"></i> 執行中</span>'
      : '<span class="badge bg-secondary fs-6"><i class="bi bi-circle"></i> 已停止</span>';
    $('#status-text').replaceWith(badge);

    if (d.jobs && d.jobs.length) {
      const next = d.jobs[0].next_run;
      $('#next-run-info').text('下次執行：' + (next ? next.replace('T',' ').substring(0,16) : '—'));
    } else {
      $('#next-run-info').text('目前沒有排定的任務');
    }
  });
}

function controlScheduler(action) {
  $.ajax({
    url: `/api/scheduler/${action}/`,
    method: 'POST',
    headers: { 'X-CSRFToken': getCookie('csrftoken') },
    success: function(d) {
      alert(d.message);
      loadStatus();
    }
  });
}

function runNow() {
  $('#btn-run-now').prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span>啟動中...');
  $.ajax({
    url: '/api/scheduler/run_task/',
    method: 'POST',
    data: { task: 'analyzer' },
    headers: { 'X-CSRFToken': getCookie('csrftoken') },
    success: function(d) {
      $('#run-result').html(`<div class="alert alert-success py-2">${d.message}</div>`);
    },
    error: function() {
      $('#run-result').html('<div class="alert alert-danger py-2">執行失敗</div>');
    },
    complete: function() {
      $('#btn-run-now').prop('disabled', false).html('<i class="bi bi-robot"></i> 立即執行情緒分析');
      setTimeout(loadHistory, 2000);
    }
  });
}

function loadHistory() {
  $.getJSON('/api/scheduler/history/', function(d) {
    if (!d.history.length) {
      $('#history-table').html('<div class="text-center py-4 text-muted">尚無執行紀錄</div>');
      return;
    }
    const rows = d.history.slice(0,20).map(h => {
      const badge = h.status === 'success'
        ? '<span class="badge bg-success">成功</span>'
        : '<span class="badge bg-danger">失敗</span>';
      const time = h.started_at.replace('T',' ').substring(0,16);
      return `<tr><td>${time}</td><td>${h.task}</td><td>${badge}</td></tr>`;
    }).join('');
    $('#history-table').html(`
      <table class="table table-sm table-hover mb-0">
        <thead class="table-light"><tr><th>執行時間</th><th>任務</th><th>狀態</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`);
  });
}

$(function(){
  loadStatus();
  loadHistory();
});
</script>
{% endblock %}
